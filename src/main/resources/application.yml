spring:
  application:
    name: vesak-cards-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/vesak_cards}
    username: ${DATABASE_USERNAME:vesak}
    password: ${DATABASE_PASSWORD:vesak123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  cache:
    type: redis
    redis:
      time-to-live: 3600000

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/plain
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  share-base-url: ${SHARE_BASE_URL:http://localhost:3000}
  slug:
    length: 8
    max-retries: 3
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-20250514
